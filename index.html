<body style="text-align:center; margin-top:100px; font-family:Arial;">

    <h3>
        आपने इतना समय दिया, इसलिए मैंने सोचा कि नाम को कुछ अलग और खास तरीके से प्रस्तुत किया जाए।
        इसमें थोड़ा समय अवश्य लगा, लेकिन मुझे लगा कि इसे कुछ अलग तरीके से बताया जाए। 😊

    <button onclick="showName()">Click Here</button>

    <h1 id="result"></h1>

    <div id="player"></div>

    <script>
        function showName() {

            document.getElementById("result").innerText = "Pawan";

            document.getElementById("player").innerHTML = `
                <iframe
                    width="0"
                    height="0"
                    src="https://www.youtube.com/embed/wTgrZE9RWNY?autoplay=1"
                    frameborder="0"
                    allow="autoplay"
                ></iframe>
            `;
        }
    </script>
