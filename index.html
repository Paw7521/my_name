<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Name</title>

<style>

body{
    font-family:Arial,sans-serif;
    text-align:center;
    margin:0;
    background:#f8f8f8;
}

#welcomeScreen{
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
}

#mainContent{
    display:none;
    margin-top:100px;
    padding:20px;
}

button{
    padding:12px 25px;
    font-size:18px;
    cursor:pointer;
    border:none;
    border-radius:8px;
}

.wave-name{
    font-size:90px;
    font-weight:bold;
    color:#222;
    margin-top:30px;
    animation:waveEntry 2.5s ease-out forwards;
}

@keyframes waveEntry{

    0%{
        opacity:0;
        transform:translateX(-500px) rotate(-20deg);
    }

    30%{
        opacity:1;
        transform:translateX(150px) rotate(10deg);
    }

    55%{
        transform:translateX(-80px);
    }

    75%{
        transform:translateX(40px);
    }

    100%{
        transform:translateX(0);
    }

}

.message{
    max-width:800px;
    margin:25px auto;
    line-height:1.9;
    font-size:18px;
}

#explosion{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    pointer-events:none;
    overflow:hidden;
}

.particle{
    position:absolute;
    width:12px;
    height:12px;
    border-radius:50%;
    animation:boom 1.5s ease-out forwards;
}

@keyframes boom{

    0%{
        opacity:1;
        transform:translate(0,0) scale(1);
    }

    100%{
        opacity:0;
        transform:
        translate(var(--x),var(--y))
        scale(0);
    }

}

</style>

</head>

<body>

<div id="explosion"></div>

<div id="welcomeScreen">

    <h1>Welcome 😊</h1>

    <p>कुछ अलग देखने के लिए Continue पर क्लिक करें</p>

    <button onclick="startWebsite()">
        Continue
    </button>

</div>

<div id="mainContent">

    <h3>
        आपने इतना समय दिया, इसलिए मैंने सोचा कि नाम को कुछ अलग और खास तरीके से प्रस्तुत किया जाए।
        इसमें थोड़ा समय अवश्य लगा, आपके द्वारा दिए गए समय के बराबर तो नहीं,
        पर कुछ अलग तरीके से बताया जाए। 😊
    </h3>

    <button onclick="showName()">
        Click Here
    </button>

    <div id="result"></div>

</div>

<div id="player"></div>

<script>

function createExplosion(){

    const container =
    document.getElementById("explosion");

    for(let i=0;i<70;i++){

        const p =
        document.createElement("div");

        p.className="particle";

        p.style.left =
        window.innerWidth/2 + "px";

        p.style.top =
        window.innerHeight/2 + "px";

        p.style.background =
        `hsl(${Math.random()*360},100%,50%)`;

        p.style.setProperty(
        "--x",
        (Math.random()*1000-500)+"px"
        );

        p.style.setProperty(
        "--y",
        (Math.random()*1000-500)+"px"
        );

        container.appendChild(p);

        setTimeout(()=>{
            p.remove();
        },1500);
    }
}

function startWebsite(){

    createExplosion();

    setTimeout(()=>{

        document.getElementById("welcomeScreen").style.display="none";

        document.getElementById("mainContent").style.display="block";

        document.getElementById("player").innerHTML = `
            <iframe
                width="0"
                height="0"
                src="https://www.youtube.com/embed/wTgrZE9RWNY?autoplay=1&loop=1&playlist=wTgrZE9RWNY"
                allow="autoplay"
            ></iframe>
        `;

    },1200);

}

function showName(){

    document.getElementById("result").innerHTML = `

        <div class="wave-name">
            Pawan
        </div>

        <div class="message">

            ......... 😊

        </div>

    `;

}

</script>

</body>
</html>
